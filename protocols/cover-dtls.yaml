id: cover-dtls
name: "DTLS"
kind: cover
family: cover
status: active
category: transport-encryption
rfc: [9147, 6347, 9146, 9145, 5764, 7252]
collateral_cost: high
crypto_surface:
  visible:
    - "client IP + ephemeral source port → server IP + UDP port (varies; commonly 3478 STUN-multiplexed, 5349 TURNS, 4500 IPsec-NAT-T, 5684 CoAP-DTLS, 443 Cisco AnyConnect, ephemeral high ports for WebRTC)"
    - "DTLS record header (13 bytes): type | version (0xfeff DTLS 1.0 / 0xfefd 1.2 / 0xfefc 1.3) | epoch (2B) | sequence number (6B) | length (2B). Distinct from TLS's 5-byte header."
    - "ClientHello / ServerHello — same TLS 1.3 / 1.2 inner content as TLS-over-TCP, decryptable by anyone (no Initial-keys obfuscation like QUIC)"
    - "HelloVerifyRequest cookie exchange (DTLS-distinctive DoS-protection round trip)"
    - "Handshake-message fragmentation fields (message_seq, fragment_offset, fragment_length)"
    - "Encrypted-record sizes + timing on the steady state"
    - "Connection ID (RFC 9146 / 9145) when negotiated — survives NAT rebinding"
  encrypted:
    - "Everything past the handshake — all DTLS 1.2 / 1.3 application data"
    - "(in DTLS-SRTP) the inner SRTP payload — the actual media bytes"
    - "(with ECH on the inner ClientHello) the inner SNI / ALPN"
