summary: |
  Datagram Transport Layer Security — TLS over UDP, with explicit record-layer sequence numbers + handshake fragmentation + a HelloVerifyRequest cookie exchange that TLS-over-TCP doesn't have. RFC 9147 (April 2022) is DTLS 1.3, deriving its cryptographic core from TLS 1.3; RFC 6347 (DTLS 1.2, 2012) is still the dominant production version. **Wire is materially distinct from both TLS-over-TCP and QUIC** — different record-header byte layout (13 bytes vs TLS's 5), explicit epoch + sequence number, distinctive cookie round trip, and UDP transport with no QUIC-style packet-number encryption. The dominant deployment is **WebRTC's DTLS-SRTP** (RFC 5764) — every browser-based video/voice call (Zoom, Teams, Meet, Discord, FaceTime, Snapchat, every meeting product on the public Internet). Other notable carriers: Cisco AnyConnect data-plane on UDP/443, OpenVPN-DTLS variants, CoAP-over-DTLS for IoT (RFC 7252; LwM2M billion-device fleet), IKEv2 / IPsec NAT-T edge cases. Collateral cost is **high** because of WebRTC's substrate position. **The canonical 2026 censor attack** is TSPU/Russia's March 2026 ClientHello-fingerprint match against pion-DTLS defaults (net4people/bbs#603), which broke Snowflake until pion-using projects adopted Psiphon's covert-dtls library or otherwise randomized fingerprints. This is the only catalog cover entry where a specific deployed implementation's default fingerprint has been a documented blocking vector — and the response set (covert-dtls in Lantern Unbounded, Psiphon Inproxy, Snowflake forks) is production catalog evidence of how a cover-protocol entry's mimicry-considerations notes turn into shipping code.
