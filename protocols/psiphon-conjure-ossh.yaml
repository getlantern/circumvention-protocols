summary: |
  Composite protocol: Psiphon's OSSH (the RC4-obfuscated SSH layer) carried as the payload of a Conjure refraction-networking tunnel. The client uses gotapdance (the Refraction Networking client library) to register with a Conjure station, opens a TCP/UDP connection to a station-controlled phantom IP, and negotiates a Conjure transport — one of `Min-OSSH`, `Prefix-OSSH`, or `DTLS-OSSH` (per `protocol.go`'s `CONJURE_TRANSPORT_*` constants). Inside the Conjure tunnel, the bytes are bare OSSH preamble + SSH session. The station DNATs the matched flow to its local handler and proxies to a Psiphon server. The combined protocol gets Conjure's IP-doesn't-exist probe-resistance plus Psiphon's SSH key-exchange and session crypto. Distinct from `psiphon-inproxy` (WebRTC P2P 1st hop) and `psiphon-tls-ossh` (real-TLS cover with HMAC-in-client_random auth) — Conjure-OSSH is the Refraction-Networking-flavored option in Psiphon's catalog.
