summary: |
  Lantern's primary protocol: a single TLS 1.3 + HTTP/2 connection that authenticates inside the TLS SessionID and looks indistinguishable from a Chrome browser visiting a real cover site (e.g. ok.ru). Multiplexes proxy traffic through HTTP/2 CONNECT streams (one TCP for many tunneled connections, defeating connection-count policing). On auth failure, the server transparently TCP-proxies the buffered ClientHello to the real cover domain — active probes complete a real handshake against the real cert and receive real HTTP responses. Adds Geneva-inspired TCP fragmentation at the SNI boundary against TSPU-style stateless DPI and 1-30ms timing jitter against cross-layer RTT fingerprinting.
