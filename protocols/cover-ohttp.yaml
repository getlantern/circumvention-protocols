id: cover-ohttp
name: "Oblivious HTTP (OHTTP)"
kind: cover
family: cover
status: active
category: app-protocol
rfc: [9458, 9540, 9614, 9180]
collateral_cost: high
crypto_surface:
  visible:
    - "(passive on-path) generic HTTPS to a relay hostname — same TLS handshake / SNI / JA3-JA4 surface as cover-tls-1-3"
    - "(passive on-path, behaviour) two-hop fanout pattern: client hits one relay; relay simultaneously contacts many gateway origins (only meaningful if the censor sees both legs)"
    - "(passive, body shape) HPKE-encapsulated body has uniform-random entropy; differs from typical JSON/protobuf API entropy distributions"
    - "(post-TLS) HTTP request method = POST; URL path is the relay's well-known endpoint (frequently `/ohttp` or `/.well-known/ohttp-relay`)"
    - "(post-TLS) Content-Type: `message/ohttp-req` (RFC 9458 §6.1) on requests; `message/ohttp-res` on responses"
    - "(DNS-time, when not using DoH) SVCB / HTTPS DNS resource record can carry an `ohttpgw` SvcParamKey (RFC 9540) that publishes gateway endpoints"
  encrypted:
    - "Inner HTTP request — method, URL path on the gateway, headers, body — all HPKE-sealed (RFC 9180)"
    - "Inner HTTP response — status code, headers, body — HPKE-sealed under the request's symmetric key"
    - "The relay never sees inner content; the gateway never sees client IP"
