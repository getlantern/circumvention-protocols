summary: |
  IETF privacy-preserving HTTP transport published as RFC 9458 (Jan 2024). Two-hop architecture: a client encapsulates an HTTP request with HPKE (RFC 9180) using a gateway's published public key, POSTs the encrypted blob to a **relay** over HTTPS, and the relay forwards to the **gateway** (which decrypts, processes, and responds). The relay sees IP but not content; the gateway sees content but not IP. **Wire is generic HTTPS to a passive on-path observer**, but several discriminators surface to a more capable adversary: the `message/ohttp-req` / `message/ohttp-res` content-types in HTTP headers (visible only to a TLS-decrypting DPI), HPKE-encapsulated bodies with uniform-random entropy that doesn't match typical JSON/protobuf API distributions, the SVCB-based gateway-discovery RR (RFC 9540), and a small set of identifiable production relay hostnames. **Collateral cost is high because of who runs the relays**: Apple's Private Cloud Compute (Apple Intelligence requests), WhatsApp's Private Processing, Google Chrome's Safe Browsing real-time URL checks (every Chrome user not opted out, since Mar 2024), Mozilla Firefox telemetry (since Oct 2023), Cloudflare Privacy Gateway, ISRG / Divvi Up. Wholesale-blocking OHTTP knocks out Apple Intelligence + half of Chrome's safety signal + Mozilla telemetry simultaneously. **Differs from generic-HTTPS subsumption** specifically because of the two-hop architecture, the content-type signature, and the bounded-entropy body shape — making it the cleanest "different from generic TLS/QUIC" entry in the cover catalog after the transport-layer pair.
