body_path: text/outline-tls-fragmentation.md
summary: |
  Outline SDK strategy that intercepts the outgoing TLS handshake record carrying the ClientHello and splits it across **multiple TLS records** (not multiple TCP segments — these are higher-layer record-level fragments). A censor that matches SNI by reading a single TLS record sees only a fragment and can't reassemble; a censor that maintains TLS record state has to allocate buffer for potential reassembly, making the censorship more expensive. Per the niere et al. ACM CCS 2023 poster — operates entirely in userspace above TCP, so no kernel privileges are required (a userspace client can fragment its own ClientHello). The Outline implementation offers a fixed-length API (`NewFixedLenStreamDialer` — split at exactly N bytes, allocation-free) and a callback API (`NewStreamDialerFunc` — caller decides the split point per ClientHello, e.g. just before / after the SNI extension). Different layer of attack from `outline-tcp-split` (which fragments at the TCP-segment layer); these two are complementary, not redundant.
