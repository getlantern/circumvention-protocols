rfc: [8446, 8447, 8448, 8449, 8470, 8773, 8879]
collateral_cost: critical
crypto_surface:
  visible:
    - "client IP + port → server IP + port"
    - "TLS record header (content type, version, length) per record"
    - "ClientHello — version, random, session_id, cipher_suites, compression, extensions (SNI is usually visible here unless ECH is in use)"
    - "ServerHello — selected version + cipher suite, server_random, session_id_echo, key_share"
    - "Server cert chain (without ECH) — length-prefixed, plaintext"
    - "ALPN value (without ECH)"
    - "Application-data record sizes + timing"
  encrypted:
    - "Everything in EncryptedExtensions onward"
    - "Certificate (with ECH; the inner ClientHello's SNI / ALPN / cert)"
    - "CertificateVerify, Finished, NewSessionTicket"
    - "Application-data record contents"
