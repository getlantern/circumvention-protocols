summary: |
  The IETF transport-encryption standard that virtually all of HTTPS, encrypted DNS, modern email, and a large fraction of UDP-based protocols (via DTLS / QUIC) ride on. RFC 8446 (Aug 2018) is the core, with maintenance updates through RFC 8449 (record-size-limit), 8470 (early-data semantics), 8773 (raw public keys), 8879 (compression certificates), and the in-progress ECH (Encrypted Client Hello) draft. Wholesale blocking is essentially equivalent to disabling the modern Internet — banking, e-commerce, government services, supply-chain APIs, employee remote access, software updates all break. Censors therefore attack TLS surgically: SNI extraction (USENIX Sec 2025), JA3/JA4 fingerprinting, fully-encrypted-traffic detection of post-handshake records, certificate-CA profiling. The visible surface that drives all of this is the **first packet in the client→server direction** (the unencrypted ClientHello), which is also the first packet most circumvention designs disguise. Encryption surface widens significantly with ECH deployed — the inner ClientHello's SNI + ALPN + cert chain become opaque — but ECH is still in partial deployment as of 2026.
