summary: |
  IETF SSH-2 protocol family (RFC 4250-4256, January 2006), refreshed by RFC 8308 / 8709 / 8731 / 8732 / 9142 across 2018-2022. **Wire-distinctness is unusually strong** — the protocol literally announces itself in plaintext via the `SSH-2.0-<software_version>` banner exchange as the very first bytes in each direction, no DPI required. **And yet SSH is virtually unblocked at the censor's port-22 layer** because of collateral cost: every Linux server, every cloud-provisioned VM, every developer's daily workflow (git push / scp / Ansible / VS Code Remote-SSH / Cursor / JetBrains Gateway), every network-device admin path runs over SSH. Wholesale-blocking port 22 breaks the **administration plane** of the modern Internet. This is the textbook case where wire-fingerprintability is high but censor-block-cost is also high — collateral freedom protecting a protocol that would otherwise be trivially identified. Notable cryptographic state in 2026: post-quantum hybrid key exchange (`sntrup761x25519-sha512@openssh.com`) is OpenSSH's default since 9.0 (April 2022) and the deployed cover-population standard. Common circumvention covers ride SSH already (Psiphon's OSSH wraps an obfuscation layer around SSH; SSH-on-port-443 is a long-standing manual evasion). Catalog-relevant for new designs because the post-quantum KEX is one of the cleanest "this is what real OpenSSH on the wire looks like in 2026" anchors.
