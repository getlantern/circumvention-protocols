summary: |
  The mail STARTTLS family — SMTP (RFC 3207, Feb 2002), IMAP STARTTLS (RFC 2595, Jun 1999; refreshed in RFC 9051), and POP3 STLS (RFC 2595). One umbrella entry because all three share the same structural cover shape: a cleartext ASCII line-protocol prelude on a fixed port (TCP/25 SMTP relay, TCP/587 SMTP submission, TCP/143 IMAP, TCP/110 POP3), capability advertisement listing STARTTLS / STLS, client issues `STARTTLS` or `STLS`, server acks, then inline TLS handshake on the same TCP connection. **Wire-distinct from generic TLS** — TLS at byte 0 is plain TLS; TLS after a cleartext `220 ESMTP / * OK / +OK` banner is mail STARTTLS. **Critical collateral cost** — email is fundamental; no censor in 2026 wholesale-blocks SMTP / IMAP / POP3 ports. The implicit-TLS siblings (SMTPS TCP/465, IMAPS TCP/993, POP3S TCP/995) wire-subsume to [`cover-tls-1-3`](cover-tls-1-3.md); **this entry covers the cleartext-prelude variants only**. **Note on 2026 deployment trend**: RFC 8314 (Jan 2018) recommends implicit-TLS for new MUA deployments, and Outlook / Gmail / Apple Mail increasingly default to implicit-TLS for client submission. **However**, MTA-to-MTA SMTP on TCP/25 still **always** uses STARTTLS opportunistically (RFC 3207 + MTA-STS RFC 8461 + DANE RFC 7672), and Microsoft 365's documented submission endpoint `smtp.office365.com:587` still requires STARTTLS. The cover-population for the STARTTLS-pattern is *real and large* on TCP/25 + TCP/587 + TCP/143 STARTTLS-required configurations. Cover candidacy: **underutilized**. Like cover-rdp, mail STARTTLS gives a circumvention mimic a *different wire shape than plain TLS*, breaking detection that targets "TLS at byte 0" flows. The collateral cost is, if anything, higher than RDP — email is universal, RDP is enterprise. **Critical caveat (see body §"STARTTLS-on-cleartext vs. implicit-TLS — the cover-population shape")**: the cover-population is highly heterogeneous across the four ports. TCP/25 MTA-to-MTA STARTTLS is universal and durable — but it's *server-to-server only* and residential ISPs block outbound TCP/25, so client-facing circumvention can't use it. TCP/587 / 143 / 110 client-side cover-population is shifting to implicit-TLS (465 / 993 / 995) and proprietary HTTPS APIs (Microsoft Graph, Gmail API). Cover candidacy for client-facing circumvention is therefore narrower than the universal-email framing implies: TCP/587 with Postfix submission backing (Microsoft-365-reachable jurisdictions), TCP/143 with Dovecot IMAP backing (self-hosted-mail jurisdictions), or domestic-mail-provider ports (Chmail Iran, Mail.ru Russia, NetEase / QQ Mail China) inside the censor's own ASN.
