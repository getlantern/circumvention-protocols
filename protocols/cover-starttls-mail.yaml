id: cover-starttls-mail
name: "STARTTLS — SMTP / IMAP / POP3"
kind: cover
family: cover
status: active
category: mail
rfc: [3207, 2595, 5321, 6409, 8314, 9051, 1939, 7817, 8461, 8689, 7672]
collateral_cost: critical
crypto_surface:
  visible:
    - "client IP + ephemeral source port → server IP + canonical mail port (TCP/25 SMTP relay, TCP/587 SMTP submission, TCP/143 IMAP, TCP/110 POP3 — all cleartext-then-STARTTLS-upgrade. Implicit-TLS siblings TCP/465 SMTPS, TCP/993 IMAPS, TCP/995 POP3S subsume to [`cover-tls-1-3`](cover-tls-1-3.md))"
    - "**Cleartext ASCII banner** as the first server-to-client bytes. SMTP: `220 <hostname> ESMTP <software>\\r\\n`. IMAP: `* OK [CAPABILITY ...] <hostname> ... ready\\r\\n`. POP3: `+OK <hostname> POP3 server ready\\r\\n`. Each banner names the server software and version — reading the banner is sufficient identification."
    - "Cleartext capability advertisement listing **STARTTLS** (SMTP / IMAP) or **STLS** (POP3) as supported"
    - "Cleartext **STARTTLS** / **STLS** command sent from client"
    - "Cleartext server response acknowledging TLS readiness: SMTP `220 Ready to start TLS\\r\\n`, IMAP `<tag> OK Begin TLS negotiation now\\r\\n`, POP3 `+OK Begin TLS negotiation\\r\\n`"
    - "**TLS handshake follows on the same TCP connection** — ServerHello, cert chain, ClientHello fingerprint visible. The TLS handshake comes after the cleartext line-protocol prelude, not at byte 0 — distinct from implicit-TLS / cover-tls-1-3 wire shape."
    - "(post-handshake) TLS-encrypted record sizes + timing"
    - "TCP keepalive shape — IMAP IDLE sessions in particular can stay open for tens of minutes between activity"
  encrypted:
    - "(after STARTTLS / STLS upgrade — overwhelmingly the production pattern in 2026) the entire mail-protocol exchange — AUTH credentials, MAIL FROM / RCPT TO / DATA bodies, IMAP LOGIN / SELECT / FETCH / IDLE responses, POP3 USER / PASS / RETR responses, all message content, all attachments"
    - "(with TLS server cert) the inner cert subject — readable in cert chain when ECH is not deployed (ECH for mail STARTTLS is a draft, not yet production)"
