summary: |
  QUIC-based proxy that authenticates with an HTTP/3 request to a fixed virtual host (`https://hysteria/auth`) carrying a `Hysteria-Auth: <password>` header — the server replies HTTP/3 status `233` on success. Proxy traffic rides as custom QUIC stream frames (frame type `0x401` for TCP requests) and QUIC datagrams (for UDP), all with adjustable padding to defeat shape fingerprinting. An optional **Salamander** obfuscation layer wraps every UDP packet (including the QUIC handshake itself) in a per-packet BLAKE2b-256 keystream XOR keyed by a pre-shared password + 8-byte random salt — without it, the connection looks like generic HTTP/3; with it, it looks like undifferentiated UDP noise. Custom congestion control ("Brutal CC") plus QUIC's built-in loss recovery is what gives hysteria2 its fast-over-lossy-networks reputation, but the design's evasion surface is the auth-via-HTTP/3 + Salamander combo, not the CC.
