summary: |
  Refraction-networking station code: instead of running circumvention proxies at fixed endpoint IPs, Conjure deploys "stations" at backbone routers of cooperating ISPs. A client that wants to use Conjure connects to a **phantom IP** — a randomly chosen IP inside a subnet the station controls but doesn't actually serve — with a special TCP-level "tag" the station detects passively (PF_RING zero-copy capture). The station DNAT-redirects the matched flow to a local handler that speaks the negotiated transport protocol, while flows to the same phantom IP without the tag are silently dropped (they look unrouted to the censor). Because the proxy doesn't have a fixed IP — every connection uses a different randomly-chosen phantom — the censor can't enumerate or blocklist proxy endpoints; blocking would require blocking entire ISP-controlled subnets. Multiple **registration channels** (decoy-registrar, DNS-registrar) tell the station to expect a particular client; multiple **transport protocols** (Min, Obfs4, Prefix, DTLS) are wrappers the client and station agree on for the post-tag bytes. Backed by ACM CCS 2019 paper (`2019-frolov-conjure`); the underlying technique is the Refraction Networking research line that started with TapDance (USENIX 2014).
