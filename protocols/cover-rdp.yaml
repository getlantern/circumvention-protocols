id: cover-rdp
name: "RDP"
kind: cover
family: cover
status: active
category: app-protocol
rfc: [905, 1006, 2126]
collateral_cost: high
crypto_surface:
  visible:
    - "client IP + ephemeral source port → server IP + TCP/3389 (overwhelmingly default; UDP/3389 for the RDP-UDP transport extension since Windows Server 2012)"
    - "**TPKT version-3 header** as the very first 4 bytes of every TCP/3389 connection: `03 00 LEN_HI LEN_LO` (RFC 1006). The fixed `03 00` prefix is an unmistakable wire fingerprint."
    - "**X.224 / ITU-T X.224 connection PDU** immediately after TPKT: LI (length indicator) | **TPDU type 0xE0 (ConnectionRequest)** | DST-REF | SRC-REF | class+option. The 0xE0 byte is the canonical native-RDP marker."
    - "**RDP NEG REQ** structure inside the X.224 ConnectionRequest cookie (RDP 5.x+): `Cookie: mstshash=<username>\\r\\n` cleartext, then RDP_NEG_REQ TLV announcing `requestedProtocols` (PROTOCOL_RDP=0x0, PROTOCOL_SSL=0x1, PROTOCOL_HYBRID/CredSSP=0x2, PROTOCOL_HYBRID_EX=0x8). The `mstshash=` cookie is **plaintext on the wire** and identifies RDP unambiguously."
    - "X.224 ConnectionConfirm response — TPDU type 0xD0 — with selectedProtocol echoing the chosen security layer"
    - "(if PROTOCOL_RDP=0x0 selected — legacy unencrypted RDP) all subsequent bytes including MCS Connect Initial, Erect Domain, Attach User, Channel Join, plus full GUI updates"
    - "(if PROTOCOL_SSL=0x1 / HYBRID=0x2 / HYBRID_EX=0x8 — modern RDP) **TLS handshake follows the X.224 prelude on the same TCP connection** — ServerHello cert chain, SNI when present, ClientHello fingerprint visible. The TLS handshake comes after the TPKT/X.224 prelude, not at byte 0."
    - "On the modern path (SSL / HYBRID): the TLS-encrypted record sizes + timing on the steady state"
    - "TCP keepalive shape — RDP sessions sustain over hours / days with periodic activity bursts"
  encrypted:
    - "(when PROTOCOL_SSL or HYBRID is selected, the dominant production path) the entire RDP application-layer exchange post-TLS handshake — MCS, security exchange, GCC conference, capability negotiation, virtual channels, GUI bitmap updates, audio redirection, clipboard sync, drive redirection, RemoteApp"
    - "(when HYBRID / CredSSP is selected) the SPNEGO/Kerberos/NTLM authentication exchange — credentials never traverse cleartext on the modern path"
    - "(when HYBRID_EX) additional TLS-pinned channel-binding tokens"
