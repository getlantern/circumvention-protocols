summary: |
  Microsoft Remote Desktop Protocol — the native Windows-and-Azure remote-desktop protocol. Wire shape is **distinctive at byte 0** because of the mandatory TPKT version-3 header (`03 00 LEN_HI LEN_LO`, RFC 1006) followed by an X.224 / ITU-T X.224 ConnectionRequest PDU (TPDU type `0xE0`) carrying a cleartext `Cookie: mstshash=<username>\r\n` line. **RDP is a STARTTLS-pattern protocol**: the X.224 prelude is unencrypted and visible to any DPI, then a TLS handshake (or CredSSP / HYBRID_EX) negotiates inline on the same TCP/3389 connection if the chosen `selectedProtocol` is non-legacy. This makes RDP wire-distinct from generic TLS — a TLS handshake at byte 0 is plain TLS; a TLS handshake at byte ~36 preceded by `03 00 ... E0 ... mstshash=...` is RDP. **Collateral cost is high**: RDP is the Microsoft enterprise admin path. Wholesale-blocking TCP/3389 breaks Azure Virtual Desktop, Windows 365 Cloud PC, Microsoft Dev Box, Windows Server RDS, every AWS / Azure / GCP Windows VM admin connection, every enterprise bastion-host RDP, every helpdesk remote-support session — Microsoft enterprise customers worldwide. **Note**: this entry covers **native RDP on TCP/3389**. The increasingly-common **RD Gateway** path tunnels RDP inside HTTPS / WebSockets / RPC over TLS on TCP/443, which subsumes to [`cover-tls-1-3`](cover-tls-1-3.md). The wire-distinct cover candidacy here is specifically the on-3389 STARTTLS-shaped flow. **Cover candidacy**: underutilized. RDP-shaped circumvention designs are rare in the literature; the STARTTLS-pattern lens makes this a clean candidate for a tool that wants a different prelude shape than plain-TLS-at-byte-0.
