id: cover-turn
name: "TURN"
kind: cover
family: cover
status: active
category: real-time-media
rfc: [8656, 6062, 6156, 7635, 8155, 8489, 8657, 5928, 5780]
collateral_cost: high
crypto_surface:
  visible:
    - "client IP + ephemeral source port → server IP + canonical TURN port (UDP/3478, TCP/3478 plaintext; UDP/5349 DTLS-wrapped, TCP/5349 TLS-wrapped — TURNS)"
    - "**STUN magic cookie `0x2112A442`** at bytes 4-7 of every STUN-formatted message — the killer wire fingerprint. Fixed value, observable in plaintext on UDP/3478 and TCP/3478 even though TURN attributes themselves may carry encrypted payload bytes."
    - "STUN message type / class field at bytes 0-1 (Allocate Request 0x0003 / Response 0x0103, Refresh 0x0004, CreatePermission 0x0008, Send 0x0016 indication, Data 0x0017 indication, ChannelBind 0x0009 etc.)"
    - "STUN transaction ID (96 bits) — random per request, correlatable as a request/response pair"
    - "STUN attributes — XOR-MAPPED-ADDRESS, USERNAME (cleartext), REALM, NONCE, MESSAGE-INTEGRITY, REQUESTED-TRANSPORT, LIFETIME, RESERVATION-TOKEN, CHANNEL-NUMBER, ERROR-CODE, FINGERPRINT (CRC-32 with magic constant `0x5354554e`)"
    - "ChannelData framing on the steady state — 16-bit channel number `0x4000-0x7FFF` then 16-bit length then opaque data. The channel-number high bits (0b01) distinguish ChannelData from STUN messages (which start 0b00)."
    - "Allocate / Refresh exchange shape — request, 401-with-NONCE, request-with-credentials, success — every TURN session begins with this distinctive two-round-trip negotiation"
    - "On TCP/3478: 4-byte length-prefixed framing of STUN messages (RFC 8656 §2.1) — distinguishable from raw TCP"
  encrypted:
    - "(if transported over TURNS / TURN-over-TLS or TURN-over-DTLS) the entire STUN message and ChannelData stream — see [`cover-tls-1-3`](cover-tls-1-3.md), [`cover-dtls`](cover-dtls.md)"
    - "MESSAGE-INTEGRITY HMAC value when present (computed over message but value itself is opaque random-looking bytes)"
    - "DATA attribute payload bytes when the inner peer connection runs DTLS-SRTP / SRTP — the WebRTC media itself"
