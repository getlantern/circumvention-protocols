summary: |
  Traversal Using Relays around NAT (RFC 8656, Feb 2020 — obsoletes RFC 5766) is the WebRTC NAT-traversal fallback: when ICE direct-connect and STUN-port-prediction both fail, the call relays through a TURN server. **Wire-distinctness comes from the STUN message format that TURN uses for its control plane** — every STUN message carries `0x2112A442` as a fixed magic cookie at offset 4, and ChannelData frames on the steady state use the distinctive `0x4000-0x7FFF` channel-number range. This is a wholly different wire shape from generic UDP encrypted traffic; a censor cannot confuse plain TURN on UDP/3478 with QUIC, DTLS, or generic VPN. **And yet TURN is generally not blocked** because of its substrate role in WebRTC: the relay path carries ~10-20% of WebRTC sessions whose peers can't connect directly. Wholesale-block breaks Twilio Video, Vonage Video, every Cloudflare Calls customer, every video-conferencing vendor's hostile-NAT path. Common deployments: coturn (open-source dominant), pion/turn (Go), Twilio NTS, Xirsys, Vonage, Cloudflare Calls, Microsoft Teams fleet, Google Meet fleet. **Cover candidacy**: TURN is the rare protocol with strong wire fingerprint AND high collateral cost — fingerprintability doesn't matter when the censor can't afford the block. Catalog-relevant for circumvention designs that want a relayed-WebRTC channel where the cover *announces itself* as TURN cleartext on the wire and rides the cover-WebRTC collateral. The TURNS variants (UDP/5349, TCP/5349) subsume to [`cover-dtls`](cover-dtls.md) and [`cover-tls-1-3`](cover-tls-1-3.md) respectively. **Critical caveat (see body §"Plain TURN vs. TURNS — the cover-population shape")**: the production majority of commercial TURN traffic in 2026 is TURNS-wrapped, not plain TURN. The wire-distinct plain-3478 cover candidacy rides the self-hosted coturn long tail (Jitsi, Matrix homeservers, Nextcloud Talk, smaller WebRTC SaaS) — not the ubiquitous-WebRTC-everyone path. Choosing this cover means choosing that niche.
