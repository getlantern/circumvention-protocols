id: cover-quic
name: "QUIC"
kind: cover
family: cover
status: active
category: transport-encryption
rfc: [9000, 9001, 9002, 9114, 9204, 9221, 9250, 9298, 9369, 9484, 9701]
collateral_cost: critical
crypto_surface:
  visible:
    - "client IP + ephemeral source port → server IP + UDP/443 (overwhelmingly)"
    - "QUIC version field on Initial packets (4 bytes; 0x00000001 for QUIC v1, 0x6b3343cf for QUIC v2)"
    - "Source / Destination Connection ID lengths and bytes on long-header packets (Initial / Handshake / 0-RTT)"
    - "Token field on Initial (Retry / NEW_TOKEN-derived)"
    - "Inner TLS ClientHello carried in CRYPTO frames inside Initial packets — same SNI / ALPN / extensions / JA3/JA4-equivalent fingerprint as TLS-over-TCP, decryptable with the spec-published Initial keys"
    - "Short-header (1-RTT) packet boundaries + sizes + timings on the encrypted steady state — sometimes including a stable destination Connection ID across an entire session unless the server rotates"
    - "Spin bit (1 bit per 1-RTT packet) for end-to-end latency measurement, when enabled"
  encrypted:
    - "Everything past Initial keys: Handshake, 0-RTT, and 1-RTT payloads (frames, streams, datagrams)"
    - "ALPN value on the inner ClientHello when ECH is in use"
    - "All HTTP/3 framing: requests, responses, headers (QPACK-compressed), bodies, server push, datagrams"
    - "QUIC Connection-Close, NEW_CONNECTION_ID, PATH_CHALLENGE / PATH_RESPONSE — all in 1-RTT-encrypted payload"
common_implementations:
