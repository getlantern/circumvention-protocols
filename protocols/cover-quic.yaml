  - {name: "msquic", vendor: "Microsoft", scope: "Windows network stack, IIS, MS Edge fallback, SMB-over-QUIC server side"}
  - {name: "quiche", vendor: "Cloudflare", scope: "Cloudflare's edge — every CF-fronted property's HTTP/3 + WARP MASQUE + DoH/DoQ"}
  - {name: "mvfst", vendor: "Meta", scope: "Meta production traffic — Facebook / Instagram / WhatsApp"}
  - {name: "s2n-quic", vendor: "Amazon Web Services", scope: "AWS CloudFront, several AWS-managed services"}
  - {name: "Apple's QUIC", vendor: "Apple", scope: "macOS / iOS / iPadOS / visionOS Network framework — iCloud, App Store, Apple Push, MASQUE relay client"}
  - {name: "ngtcp2 + nghttp3", vendor: "ngtcp2 project", scope: "curl, the standard reference implementation; many CDN edge testbeds"}
  - {name: "quic-go", vendor: "quic-go project", scope: "Caddy, sing-box, lantern-box, hysteria2 (apernet's fork), most Go HTTP/3 servers"}
  - {name: "picoquic", vendor: "Christian Huitema", scope: "Research / IETF interop reference"}
