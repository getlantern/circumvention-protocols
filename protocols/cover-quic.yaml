summary: |
  IETF transport-encryption protocol that runs TLS 1.3 over UDP. RFC 9000 (May 2021) is the v1 core, with RFC 9001 mapping TLS 1.3 onto it, RFC 9002 specifying loss recovery + congestion control, and RFC 9221 adding unreliable DATAGRAM frames. The QUIC + HTTP/3 (RFC 9114) substrate carries roughly 30-40% of all HTTP requests in 2026 (Cloudflare Radar, W3Techs) and is the wire for **a growing constellation of distinct application protocols** that all look identical to QUIC at the censor's vantage point: HTTP/3 itself, MASQUE (CONNECT-UDP / CONNECT-IP / CONNECT-Ethernet for Apple iCloud Private Relay + Cloudflare WARP + Cisco Secure Access + Chrome IP Protection), WebTransport (Baseline 2026), Media-over-QUIC (in IETF WG), SMB-over-QUIC (Microsoft enterprise file share), DNS-over-QUIC (RFC 9250), and emerging gRPC-over-HTTP/3. **Collateral cost of a wholesale block is critical** — wholesale-blocking UDP/443 breaks the modern Internet's video-streaming, conferencing, and major-vendor consumer / enterprise stacks simultaneously. Censors instead **throttle** UDP/443 (observed in Russia 2024, Iran 2024-2025, parts of GFW under load), forcing clients to fall back to HTTP/2 over TCP. Wire is materially distinct from TLS-over-TCP — UDP transport, Connection-ID-based session identity, distinctive Initial-packet structure with unencrypted-but-obfuscated headers — but **everything that rides on QUIC subsumes to this single cover entry** by the wire-distinctness criterion.
