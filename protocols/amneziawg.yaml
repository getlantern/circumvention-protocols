summary: |
  WireGuard with configurable obfuscation — same Curve25519 + Noise IKpsk2 + ChaCha20-Poly1305 cryptographic core, but with several knobs that defeat WireGuard's distinctive packet signatures. The **AWG 2.0 release** (commit f654220, Sep 2025) is the current generation and adds: **ranged message-type "magic headers"** (H1-H4 take a `start-end` range instead of a single value, so successive handshakes vary), **S3/S4 padding** (cookie and transport-message paddings, previously only S1/S2 for the two handshake messages), and refined junk-packet processing. Plus the existing AWG 1.5 features carry forward: **junk packets** (Jc count of random-content packets sent before each handshake, sized in [Jmin, Jmax]) and **custom signature packets** (I1-I5; mini-DSL of byte-tags `<b 0xHEX>` static, `<r N>` random, `<rd N>` random digits, `<rc N>` random alpha, `<t>` 4-byte UNIX timestamp, with newer `<d>`, `<ds>`, `<dz>` data tags). All knobs are deployment-configured; both endpoints don't have to specify the same values for junk/signature packets, but H/S/handshake-shaping params do need to match. Underneath all of this it's still real WireGuard — every existing wireguard-go advantage (small attack surface, clean Noise crypto, tested kernel module) carries forward.
